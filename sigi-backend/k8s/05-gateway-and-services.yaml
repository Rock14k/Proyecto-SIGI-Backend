
# Ejemplo: docker build -t sigi/api-gateway:latest api-gateway/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: sigi
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: gw
          image: sigi/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom: [{ configMapRef: { name: sigi-common } }]
          env:
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: sigi-secret, key: JWT_SECRET } }
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: sigi
spec:
  type: NodePort
  selector: { app: api-gateway }
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
