server:
  port: 8086

spring:
  application:
    name: servicio-notificacion
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3311}/db_notificacion?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Vecinos simulados: IDs de usuario (tabla usuarios) separados por coma. En demo suele ir vacío.
sigi:
  notificacion:
    usuarios-extra-por-config: ${SIGI_USUARIOS_ALERTA_EXTRA:}
