server:
  port: 8083

spring:
  application:
    name: servicio-ubicacion
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/db_ubicacion?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

# Clave OpenCage (plan gratuito). En Docker usar variable de entorno.
opencage:
  api:
    key: ${OPENCAGE_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
